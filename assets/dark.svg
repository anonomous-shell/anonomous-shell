<svg
xmlns="http://www.w3.org/2000/svg"
width="1180"
height="610"
viewBox="0 0 1180 610">

<rect
width="1180"
height="610"
rx="28"
fill="#030712"/>
<defs>

<!-- Background Gradient -->
<radialGradient id="bgGlow1" cx="20%" cy="20%" r="80%">
    <stop offset="0%" stop-color="#7C3AED" stop-opacity="0.35">
        <animate attributeName="stop-opacity"
                 values="0.25;0.45;0.25"
                 dur="8s"
                 repeatCount="indefinite"/>
    </stop>
    <stop offset="100%" stop-color="#030712" stop-opacity="0"/>
</radialGradient>

<radialGradient id="bgGlow2" cx="80%" cy="80%" r="70%">
    <stop offset="0%" stop-color="#22D3EE" stop-opacity="0.28">
        <animate attributeName="stop-opacity"
                 values="0.15;0.35;0.15"
                 dur="10s"
                 repeatCount="indefinite"/>
    </stop>
    <stop offset="100%" stop-color="#030712" stop-opacity="0"/>
</radialGradient>

<!-- Border Gradient -->
<linearGradient id="borderGradient"
gradientUnits="userSpaceOnUse"
x1="0"
y1="0"
x2="1180"
y2="610">

<stop offset="0%" stop-color="#7C3AED">
<animate attributeName="offset"
values="-1;1"
dur="8s"
repeatCount="indefinite"/>
</stop>

<stop offset="50%" stop-color="#22D3EE"/>

<stop offset="100%" stop-color="#10B981"/>

</linearGradient>

<!-- Glass Blur -->
<filter id="glassBlur">
<feGaussianBlur stdDeviation="18"/>
</filter>

</defs>

<!-- Animated Background Glow -->

<circle cx="240" cy="150" r="260"
fill="url(#bgGlow1)">

<animateTransform
attributeName="transform"
type="translate"
values="0 0;40 20;0 0"
dur="18s"
repeatCount="indefinite"/>

</circle>

<circle cx="980" cy="480" r="250"
fill="url(#bgGlow2)">

<animateTransform
attributeName="transform"
type="translate"
values="0 0;-30 -25;0 0"
dur="22s"
repeatCount="indefinite"/>

</circle>

<!-- Main Glass Panel -->

<rect
x="30"
y="30"
rx="24"
width="1120"
height="550"
fill="#0F172A"
fill-opacity="0.62"
stroke="url(#borderGradient)"
stroke-width="1.3"/>

<!-- Subtle Reflection -->

<rect
x="30"
y="30"
rx="24"
width="1120"
height="550"
fill="white"
opacity="0.03">

<animate
attributeName="opacity"
values="0.02;0.05;0.02"
dur="6s"
repeatCount="indefinite"/>

</rect>
</svg>
