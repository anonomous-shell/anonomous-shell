<svg
xmlns="http://www.w3.org/2000/svg"
width="1180"
height="610"
viewBox="0 0 1180 610">

<rect
width="1180"
height="610"
rx="28"
fill="#030712"/>
<defs>

<!-- Background Gradient -->
<radialGradient id="bgGlow1" cx="20%" cy="20%" r="80%">
    <stop offset="0%" stop-color="#7C3AED" stop-opacity="0.35">
        <animate attributeName="stop-opacity"
                 values="0.25;0.45;0.25"
                 dur="8s"
                 repeatCount="indefinite"/>
    </stop>
    <stop offset="100%" stop-color="#030712" stop-opacity="0"/>
</radialGradient>

<radialGradient id="bgGlow2" cx="80%" cy="80%" r="70%">
    <stop offset="0%" stop-color="#22D3EE" stop-opacity="0.28">
        <animate attributeName="stop-opacity"
                 values="0.15;0.35;0.15"
                 dur="10s"
                 repeatCount="indefinite"/>
    </stop>
    <stop offset="100%" stop-color="#030712" stop-opacity="0"/>
</radialGradient>

<!-- Border Gradient -->
<linearGradient id="borderGradient"
gradientUnits="userSpaceOnUse"
x1="0"
y1="0"
x2="1180"
y2="610">

<stop offset="0%" stop-color="#7C3AED">
<animate attributeName="offset"
values="-1;1"
dur="8s"
repeatCount="indefinite"/>
</stop>

<stop offset="50%" stop-color="#22D3EE"/>

<stop offset="100%" stop-color="#10B981"/>

</linearGradient>

<!-- Glass Blur -->
<filter id="glassBlur">
<feGaussianBlur stdDeviation="18"/>
</filter>

</defs>

<!-- Animated Background Glow -->

<circle cx="240" cy="150" r="260"
fill="url(#bgGlow1)">

<animateTransform
attributeName="transform"
type="translate"
values="0 0;40 20;0 0"
dur="18s"
repeatCount="indefinite"/>

</circle>

<circle cx="980" cy="480" r="250"
fill="url(#bgGlow2)">

<animateTransform
attributeName="transform"
type="translate"
values="0 0;-30 -25;0 0"
dur="22s"
repeatCount="indefinite"/>

</circle>

<!-- Main Glass Panel -->

<rect
x="30"
y="30"
rx="24"
width="1120"
height="550"
fill="#0F172A"
fill-opacity="0.62"
stroke="url(#borderGradient)"
stroke-width="1.3"/>

<!-- Subtle Reflection -->

<rect
x="30"
y="30"
rx="24"
width="1120"
height="550"
fill="white"
opacity="0.03">

<animate
attributeName="opacity"
values="0.02;0.05;0.02"
dur="6s"
repeatCount="indefinite"/>

</rect>
<!-- ========================= -->
<!-- LEFT TERMINAL PANEL -->
<!-- ========================= -->

<g id="portraitPanel">

  <!-- Terminal Window -->
  <rect
      x="55"
      y="65"
      width="360"
      height="480"
      rx="18"
      fill="#08111F"
      stroke="#23324D"
      stroke-width="1.2"/>

  <!-- Terminal Header -->
  <rect
      x="55"
      y="65"
      width="360"
      height="42"
      rx="18"
      fill="#111C2F"/>

  <circle cx="82" cy="86" r="5" fill="#FF5F56"/>
  <circle cx="102" cy="86" r="5" fill="#FFBD2E"/>
  <circle cx="122" cy="86" r="5" fill="#27C93F"/>

  <text
      x="180"
      y="91"
      fill="#8FA2C2"
      font-size="13"
      font-family="monospace">
      terminal://aaryansh
  </text>

  <!-- Portrait Area -->
  <rect
      x="72"
      y="122"
      width="326"
      height="405"
      rx="12"
      fill="#040B16"/>

</g>

<!-- ========================= -->
<!-- SCANLINE -->
<!-- ========================= -->

<rect
    x="72"
    y="122"
    width="326"
    height="3"
    fill="#22D3EE"
    opacity=".18">

    <animate
        attributeName="y"
        values="122;520;122"
        dur="4s"
        repeatCount="indefinite"/>

</rect>

<!-- ========================= -->
<!-- FLOATING GLOW -->
<!-- ========================= -->

<circle
    cx="235"
    cy="325"
    r="140"
    fill="#22D3EE"
    opacity=".05">

    <animate
        attributeName="opacity"
        values=".03;.08;.03"
        dur="6s"
        repeatCount="indefinite"/>

</circle>

<!-- ========================= -->
<!-- PORTRAIT GROUP -->
<!-- ========================= -->

<g id="asciiPortrait">

<animateTransform
attributeName="transform"
type="translate"
values="0 0;0 -6;0 0"
dur="5s"
repeatCount="indefinite"/>

<text
x="105"
y="170"
font-family="monospace"
font-size="9"
fill="#7DD3FC"
xml:space="preserve">

██████████████████████████
██████████████████████████
███████▒▒▒▒▒▒▒████████████
█████▒▒████████▒▒█████████
████▒▒██      ██▒▒████████
████▒▒██ ●  ● ██▒▒████████
████▒▒██   ▄   ██▒▒███████
████▒▒██ ▀▀▀▀ ██▒▒████████
█████▒▒████████▒▒█████████
██████▒▒▒▒▒▒▒▒▒███████████
██████████████████████████
██████████████████████████

<animate
attributeName="opacity"
values="0;1"
dur="2.5s"
fill="freeze"/>

</text>

</g>
</svg>
